<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego de la Serpiente - Taller</title>
    <link rel="stylesheet" href="serpiente.css" />
  </head>
  <body>
    <main class="contenedor-juego">
      <h1>Juego de la Serpiente</h1>
      <p class="descripcion">Agrega una descripción creativa</p>

      <section class="panel-info">
        <div class="tarjeta-info">
          <span>Puntaje</span>
          <strong id="puntaje">0</strong>
        </div>
        <div class="tarjeta-info">
          <span>Estado</span>
          <strong id="estado">Listo</strong>
        </div>
      </section>

      <canvas id="canvasJuego" width="600" height="600"></canvas>

      <section class="controles">
        <button class="vacio">-</button>
        <button id="btnArriba" onclick="cambiarDireccion('arriba')">⬆️</button>
        <button class="vacio">-</button>

        <button id="btnIzquierda" onclick="cambiarDireccion('izquierda')">⬅️</button>
        <button id = "btnPausa"  onclick="pausarJuego()">⏸️</button>
        <button id="btnDerecha" onclick="cambiarDireccion('derecha')">➡️</button>

        <button class="vacio">-</button>
        <button id="btnAbajo" onclick="cambiarDireccion('abajo')">⬇️</button>
        <button class="vacio">-</button>
      </section>

      <section class="acciones">
        <button id="btnIniciar" onclick="iniciarJuego()">Iniciar</button>
        <button id="btnReiniciar" class="secundario" onclick="reiniciarJuego()">Reiniciar</button>
      </section>

      <p id="mensaje" class="mensaje">Presiona iniciar para comenzar.</p>
    </main>
    <script src="utilitarios.js"></script>
    <script src="serpiente.js"></script>
  </body>
</html>
